<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlixGames App</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#050b14">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-8ETBY4WFPH"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-8ETBY4WFPH');
</script>

<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#050b14;font-family:'Segoe UI',Arial,sans-serif;}
iframe{position:fixed;inset:0;width:100%;height:100%;border:none;display:none;}
#installScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#050b14,#07111f);z-index:99999;padding:24px;box-sizing:border-box;}
.card{width:100%;max-width:520px;background:#07111f;border:2px solid #1d8cff;border-radius:24px;padding:34px 28px;text-align:center;box-shadow:0 25px 70px rgba(0,0,0,.6);}
.logo{max-width:210px;margin-bottom:24px;}
h1{color:#fff;font-size:32px;margin:0 0 14px;font-weight:900;}
p{color:#bfd9ff;font-size:18px;line-height:1.6;margin:0 0 22px;}
.lista{display:inline-block;text-align:left;color:#fff;font-size:18px;line-height:2;margin:18px 0 26px;}
button{width:100%;padding:17px;border:none;border-radius:14px;cursor:pointer;font-size:19px;font-weight:900;margin-top:12px;}
#btnInstall{display:none;background:#1d8cff;color:#fff;box-shadow:0 0 25px rgba(29,140,255,.45);}
#btnAbrir{background:#25344d;color:#fff;}
#status{margin-top:18px;font-size:14px;color:#9fb6d7;}
</style>
</head>

<body>

<div id="installScreen">
  <div class="card">
    <img class="logo" src="https://cdn.awsli.com.br/2293/2293972/arquivos/logo-tipo-tamanho-ideal-3-.png">

    <h1>📥 Instale a FlixGames</h1>

    <p>Use a FlixGames como aplicativo no Windows.</p>

    <div class="lista">
      ✔ Abre mais rápido<br>
      ✔ Fica na Área de Trabalho<br>
      ✔ Pode fixar na Barra de Tarefas<br>
      ✔ Funciona como programa
    </div>

    <button id="btnInstall">📥 Instalar Aplicativo</button>
    <button id="btnAbrir">🚀 Abrir sem instalar</button>

    <div id="status">Verificando instalação...</div>
  </div>
</div>

<iframe id="site" src="https://www.flixgames.com.br/"></iframe>

<script>
const tela = document.getElementById("installScreen");
const frame = document.getElementById("site");
const btnInstall = document.getElementById("btnInstall");
const btnAbrir = document.getElementById("btnAbrir");
const statusBox = document.getElementById("status");

let deferredPrompt = null;

function enviarEvento(nome, parametros){
  if (typeof gtag === "function") {
    gtag("event", nome, parametros || {});
  }
}

function abrirLoja(){
  tela.style.display = "none";
  frame.style.display = "block";

  enviarEvento("app_aberto", {
    app_name: "FlixGames PWA",
    origem: estaNoApp() ? "app_instalado" : "navegador"
  });
}

function estaNoApp(){
  return (
    window.matchMedia("(display-mode: standalone)").matches ||
    window.matchMedia("(display-mode: window-controls-overlay)").matches ||
    window.navigator.standalone === true
  );
}

if (estaNoApp()) {

    enviarEvento("app_ja_instalado", {
        app_name: "FlixGames PWA"
    });

    document.querySelector("h1").innerHTML = "🎮 FlixGames";

    document.querySelector("p").innerHTML =
        "Aplicativo já instalado.<br><strong>Carregando...</strong>";

    document.querySelector(".lista").innerHTML = `
        ✔ Sincronizando biblioteca<br>
        ✔ Verificando atualizações<br>
        ✔ Preparando seus jogos
    `;

    btnInstall.style.display = "none";
    btnAbrir.style.display = "none";

    statusBox.innerHTML = `
        <div style="margin-top:25px">

            <div style="
                width:100%;
                height:10px;
                background:#1b2738;
                border-radius:30px;
                overflow:hidden;
            ">

                <div id="progressBar" style="
                    width:0%;
                    height:100%;
                    background:linear-gradient(90deg,#00b7ff,#1d8cff,#00e0ff);
                    border-radius:30px;
                "></div>

            </div>

            <div style="
                margin-top:15px;
                color:#9fc7ff;
                font-size:14px;
            ">
                Abrindo aplicativo...
            </div>

        </div>
    `;

    let progresso = 0;

    const barra = document.getElementById("progressBar");

    const timer = setInterval(function(){

        progresso += 2;

        barra.style.width = progresso + "%";

        if(progresso >= 100){

            clearInterval(timer);

            abrirLoja();

        }

    },40);

}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}

window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault();
  deferredPrompt = e;
  btnInstall.style.display = "block";
  statusBox.innerHTML = "Clique em Instalar Aplicativo para continuar.";
});

btnInstall.addEventListener("click", async function(){
  enviarEvento("clicou_instalar_app", {
    app_name: "FlixGames PWA",
    platform: "Windows"
  });

  if (!deferredPrompt) {
    alert("A instalação ainda não está disponível. Use Google Chrome ou Microsoft Edge.");
    return;
  }

  deferredPrompt.prompt();

  const escolha = await deferredPrompt.userChoice;

  if (escolha.outcome === "accepted") {
    statusBox.innerHTML = "Aplicativo instalado com sucesso!";
    setTimeout(abrirLoja, 1000);
  } else {
    statusBox.innerHTML = "Instalação cancelada.";
  }

  deferredPrompt = null;
});

btnAbrir.addEventListener("click", function(){
  enviarEvento("abriu_sem_instalar", {
    app_name: "FlixGames PWA"
  });

  abrirLoja();
});

window.addEventListener("appinstalled", function(){
  enviarEvento("app_instalado", {
    app_name: "FlixGames PWA",
    platform: "Windows"
  });

  abrirLoja();
});

setTimeout(function(){
  if (!estaNoApp() && !deferredPrompt && btnInstall.style.display === "none") {
    statusBox.innerHTML = "Se o botão não aparecer, instale pelo ícone na barra do Chrome ou Edge.";
  }
}, 5000);
</script>

</body>
</html>
