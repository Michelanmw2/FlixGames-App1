<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FlixGames App</title>

<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#050b14">

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#050b14;
font-family:Segoe UI,Arial,sans-serif;
color:#fff;
overflow:hidden;
}

#installScreen{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#050b14,#07111f);
z-index:9999;
padding:25px;
box-sizing:border-box;
}

.box{
max-width:520px;
width:100%;
text-align:center;
background:#07111f;
border:2px solid #1d8cff;
border-radius:24px;
padding:35px 28px;
box-shadow:0 30px 80px rgba(0,0,0,.65);
}

.logo{
max-width:210px;
margin-bottom:25px;
}

h1{
font-size:32px;
margin:0 0 15px;
font-weight:900;
}

p{
color:#bfd9ff;
font-size:18px;
line-height:1.6;
margin:0 0 25px;
}

.benefits{
text-align:left;
display:inline-block;
font-size:18px;
line-height:2;
margin-bottom:30px;
}

button{
width:100%;
border:none;
border-radius:14px;
padding:18px;
font-size:20px;
font-weight:900;
cursor:pointer;
margin-top:10px;
}

#btnInstall{
background:#1d8cff;
color:#fff;
box-shadow:0 0 25px rgba(29,140,255,.45);
display:none;
}

#btnOpen{
background:#25344d;
color:#fff;
}

#status{
margin-top:18px;
font-size:14px;
color:#9db5d7;
}

iframe{
width:100%;
height:100vh;
border:none;
display:none;
}
</style>
</head>

<body>

<div id="installScreen">
  <div class="box">

    <img class="logo" src="https://cdn.awsli.com.br/2293/2293972/arquivos/logo-tipo-tamanho-ideal-3-.png">

    <h1>📥 Instale a FlixGames</h1>

    <p>
      Use a FlixGames como um aplicativo no Windows, com acesso rápido direto pela Área de Trabalho.
    </p>

    <div class="benefits">
      ✔ Abre mais rápido<br>
      ✔ Fica na Área de Trabalho<br>
      ✔ Pode fixar na Barra de Tarefas<br>
      ✔ Funciona como programa do Windows
    </div>

    <button id="btnInstall">📥 Instalar Aplicativo</button>

    <button id="btnOpen">🚀 Abrir FlixGames sem instalar</button>

    <div id="status">
      Aguarde o botão de instalação aparecer...
    </div>

  </div>
</div>

<iframe id="lojaFrame" src="https://www.flixgames.com.br/"></iframe>

<script>
let deferredPrompt = null;

const btnInstall = document.getElementById("btnInstall");
const btnOpen = document.getElementById("btnOpen");
const statusText = document.getElementById("status");
const installScreen = document.getElementById("installScreen");
const lojaFrame = document.getElementById("lojaFrame");

function abrirLoja(){
  installScreen.style.display = "none";
  lojaFrame.style.display = "block";
}

window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault();
  deferredPrompt = e;

  btnInstall.style.display = "block";
  statusText.innerHTML = "Clique no botão acima para instalar no Windows.";
});

btnInstall.addEventListener("click", async function(){

  if(!deferredPrompt){
    alert("A instalação ainda não está disponível. Use Chrome ou Microsoft Edge.");
    return;
  }

  deferredPrompt.prompt();

  const choiceResult = await deferredPrompt.userChoice;

  if(choiceResult.outcome === "accepted"){
    statusText.innerHTML = "Aplicativo instalado com sucesso!";
    setTimeout(abrirLoja, 1200);
  }else{
    statusText.innerHTML = "Instalação cancelada.";
  }

  deferredPrompt = null;
});

btnOpen.addEventListener("click", abrirLoja);

window.addEventListener("appinstalled", function(){
  statusText.innerHTML = "FlixGames instalada com sucesso!";
  setTimeout(abrirLoja, 1000);
});

if(window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone){
  abrirLoja();
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/service-worker.js");
}

setTimeout(function(){
  if(!deferredPrompt){
    statusText.innerHTML = "Se o botão não aparecer, instale pelo ícone de instalação na barra do Chrome/Edge.";
  }
},5000);
</script>

</body>
</html>
