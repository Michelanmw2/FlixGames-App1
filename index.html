<body>

<div id="installScreen">

<div class="card">

<img class="logo"
src="https://cdn.awsli.com.br/2293/2293972/arquivos/logo-tipo-tamanho-ideal-3-.png">

<h1>📥 Instale a FlixGames</h1>

<p>

Acesse a FlixGames como um aplicativo.

</p>

<div class="lista">

✔ Abre mais rápido<br>

✔ Área de Trabalho<br>

✔ Barra de tarefas<br>

✔ Funciona como aplicativo

</div>

<button id="btnInstall">

📥 Instalar Aplicativo

</button>

<button id="btnAbrir">

🚀 Abrir sem instalar

</button>

<div id="status">

Verificando suporte...

</div>

</div>

<iframe
id="site"
src="https://www.flixgames.com.br">
</iframe>

<script>
const tela = document.getElementById("installScreen");
const frame = document.getElementById("site");
const btnInstall = document.getElementById("btnInstall");
const btnAbrir = document.getElementById("btnAbrir");
const status = document.getElementById("status");

let deferredPrompt = null;
const modoInstalar = new URLSearchParams(window.location.search).get("install") === "1";

function abrirLoja(){
  tela.style.display = "none";
  frame.style.display = "block";
}

if (
  !modoInstalar &&
  (
    window.matchMedia('(display-mode: standalone)').matches ||
    window.matchMedia('(display-mode: window-controls-overlay)').matches ||
    window.navigator.standalone
  )
){
  abrirLoja();
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js');
}

window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  btnInstall.style.display = 'block';
  status.innerHTML = 'Clique em Instalar Aplicativo para abrir a instalação.';
});

btnInstall.onclick = async function(){
  if(!deferredPrompt){
    alert("A instalação ainda não está disponível. Use Google Chrome ou Microsoft Edge.");
    return;
  }

  deferredPrompt.prompt();

  const escolha = await deferredPrompt.userChoice;
  deferredPrompt = null;

  if(escolha.outcome === "accepted"){
    status.innerHTML = "Aplicativo instalado com sucesso!";
    setTimeout(abrirLoja, 1200);
  } else {
    status.innerHTML = "Instalação cancelada. Você pode tentar novamente pela barra do navegador.";
  }
};

btnAbrir.onclick = abrirLoja;

window.addEventListener('appinstalled', function(){
  localStorage.setItem("flixAppInstalado", "1");
  abrirLoja();
});

setTimeout(function(){
  if(btnInstall.style.display === "none"){
    status.innerHTML = "Se o botão de instalar não aparecer, clique no ícone de instalação na barra do Chrome/Edge.";
  }
}, 5000);
</script>
