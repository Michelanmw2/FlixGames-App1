<button id="instalarApp" style="display:none;">
📥 Instalar Aplicativo
</button>

<script>
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    document.getElementById('instalarApp').style.display = 'inline-block';
});

document.getElementById('instalarApp').addEventListener('click', async () => {

    if (!deferredPrompt) {
        alert("A instalação ainda não está disponível neste navegador.");
        return;
    }

    deferredPrompt.prompt();

    const { outcome } = await deferredPrompt.userChoice;

    deferredPrompt = null;

});
</script>
